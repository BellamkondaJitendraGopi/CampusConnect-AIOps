<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Student Dashboard - CampusConnect</title>
    <style>
        body { font-family: 'Arial', sans-serif; margin: 0; background: #f4f6f8; }

        .sidebar { position: fixed; left: 0; top: 0; width: 200px; height: 100%; background: #2e7d32; color: white; padding-top: 60px; }
        .sidebar h2 { text-align: center; margin-bottom: 30px; }
        .sidebar a { display: block; padding: 12px 20px; color: white; text-decoration: none; margin-bottom: 5px; border-radius: 4px; }
        .sidebar a:hover { background: #1b5e20; }

        .navbar { position: fixed; top: 0; left: 200px; right: 0; height: 60px; background: #2e7d32; color: white; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; }
        .navbar h1 { font-size: 20px; }
        .navbar a { color: white; text-decoration: none; font-weight: bold; }

        .main { margin-left: 200px; padding: 80px 30px 30px 30px; }
        .cards { display: flex; gap: 20px; flex-wrap: wrap; }

        .card { background: white; padding: 20px; border-radius: 10px; flex: 1 1 200px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); text-align: center; }
        .card h2 { margin: 10px 0; color: #2e7d32; }
        .card p { font-size: 14px; color: #555; }
        .card a { display: inline-block; margin-top: 10px; padding: 8px 15px; background: #2e7d32; color: white; border-radius: 5px; text-decoration: none; }
        .card a:hover { background: #1b5e20; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>Student Panel</h2>
        <a href="/student/dashboard">Dashboard</a>
        <a href="/student/jobs">Browse Jobs</a>
        <a href="#">Applied Jobs</a>
        <a href="/logout">Logout</a>
    </div>

    <div class="navbar">
        <h1>Welcome, <span th:text="${session.loggedInUser.fullName}">Student</span></h1>
        <a href="/logout">Logout</a>
    </div>

    <div class="main">
        <div class="cards">
            <div class="card">
                <h2 th:text="${totalJobs}">0</h2>
                <p>Available Jobs</p>
                <a href="/student/jobs">Browse Jobs</a>
            </div>
            <div class="card">
                <h2 th:text="${appliedJobs}">0</h2>
                <p>Jobs Applied</p>
            </div>
        </div>
    </div>

</body>
</html>
